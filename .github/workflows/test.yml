# GitHub Actions - 真人通关 UI 测试 (简化版)
name: Real User Gameplay Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/test.yml'

env:
  APK_URL: https://github.com/yiklun2/Hero-of-Legends/releases/download/v2.1-offline-test/hero_modded-aligned-debugSigned.apk
  PACKAGE_NAME: com.puddingstudio.cardgame

jobs:
  gameplay-test:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download APK
      run: |
        curl -L -o hero.apk "$APK_URL"
        ls -lh hero.apk

    - name: Install System Image
      run: |
        sdkmanager "system-images;android-28;default;x86_64"
        echo "y" | sdkmanager --licenses

    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n test \
          -k "system-images;android-28;default;x86_64" \
          -d "pixel_3a"

    - name: Start Emulator
      timeout-minutes: 10
      run: |
        emulator -avd test -no-window -no-audio -no-boot-anim -accel on -gpu swiftshader_indirect -memory 2048 &
        adb wait-for-device
        until adb shell getprop sys.boot_completed | grep -q 1; do sleep 3; done
        echo "Emulator ready!"

    - name: Install Maestro
      run: brew install maestro

    - name: Install APK
      run: adb install -r hero.apk

    - name: Run Test
      continue-on-error: true
      run: |
        mkdir -p results
        maestro test maestro/test_flow.yaml --output results/ || true

    - name: Collect Results
      if: always()
      run: |
        adb logcat -d > results/logcat.txt
        adb logcat -d | grep -E "HACK|FATAL" > results/key.txt
        cat results/key.txt

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: results/
